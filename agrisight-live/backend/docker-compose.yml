# Docker Compose for local development
# Expected env vars: MOCK_GEMINI
# Testing tips: Run `docker-compose up --build` to start the backend.

version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MOCK_GEMINI=true
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./app:/app/app
